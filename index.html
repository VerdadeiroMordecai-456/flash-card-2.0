<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS Cases • Mitos & Verdades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header com Saldo -->
        <header class="header">
            <div class="balance-container">
                <div class="balance-label">SALDO</div>
                <div class="balance-value">$999,999,999</div>
            </div>
        </header>

        <!-- Seção de Cases -->
        <main>
            <h1 class="section-title">ESCOLHA SUAS CAIXAS</h1>
            <p class="section-subtitle">Selecione no máximo 3 caixas para abrir</p>

            <div class="cases-grid" id="cases-grid">
                <!-- Cases serão inseridos via JavaScript -->
            </div>

            <div class="action-container">
                <button id="open-btn" class="open-btn" disabled>
                    ABRIR CAIXAS SELECIONADAS
                </button>
                <button id="reset-btn" class="reset-btn">Limpar Seleção</button>
            </div>
        </main>

        <!-- Área de Resultado (Unboxing) -->
        <section id="unboxing-section" class="unboxing-section hidden">
            <h2 class="section-title">RESULTADO DO UNBOXING</h2>
            <div class="cards-container" id="cards-container">
                <!-- Flashcards serão inseridos aqui -->
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
