<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myths • Cases</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <span class="neon-green">MYTHS</span>
                <span class="case-text">CASES</span>
            </div>
            <div class="balance-container">
                <div class="balance-label">SALDO</div>
                <div class="balance-value" id="balance">$100,000</div>
            </div>
        </div>
    </header>

    <main>
        <!-- Categorias -->
        <section class="categories-section">
            <h2>Escolha sua Categoria</h2>
            <div class="category-grid" id="category-grid"></div>
        </section>

        <!-- Roleta -->
        <section id="roulette-section" class="roulette-section hidden">
            <h2>Roleta de Revelação</h2>
            <div class="roulette-container">
                <div class="roulette-pointer"></div>
                <div class="roulette-strip" id="roulette-strip"></div>
            </div>
            <p class="roulette-info">A roleta está girando...</p>
        </section>

        <!-- Resultados -->
        <section class="results-section">
            <div class="results-header">
                <h2>Flashcards Obtidos</h2>
                <button id="clear-results" class="btn-secondary">Limpar</button>
            </div>
            <div class="cards-container" id="cards-container"></div>
        </section>
    </main>

    <!-- Alerta -->
    <div id="alert-modal" class="alert-modal hidden">
        <div class="alert-content">
            <p id="alert-message"></p>
            <button id="close-alert">Fechar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
